{% load static %}
<!-- Header - Tối giản theo mẫu folder tham chiếu -->
<header class="main-header">
    <div class="header-left">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar">
            <i class="bi bi-list"></i>
        </button>
        <div class="page-title-wrapper">
            <h1 class="page-title">{{ page_title|default:'Dashboard' }}</h1>
        </div>
    </div>
    
    <div class="header-right">
        <!-- User Menu -->
        <div class="dropdown">
            <button class="btn-user-modern" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="user-avatar-modern">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="user-info">
                    <span class="user-name">{{ request.user.full_name|default:request.user.username }}</span>
                    <span class="user-role">{{ request.user.get_role_display }}</span>
                </div>
                <i class="bi bi-chevron-expand"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end dropdown-user-modern">
                <li class="dropdown-user-header">
                    <div class="user-avatar-lg">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div class="user-header-info">
                        <span class="user-fullname">{{ request.user.full_name|default:request.user.username }}</span>
                        <span class="user-email">{{ request.user.email|default:request.user.username }}</span>
                    </div>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="bi bi-person me-2"></i>Thông tin cá nhân
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="/shop/" target="_blank">
                        <i class="bi bi-box-arrow-up-right me-2"></i>Xem cửa hàng
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form action="{% url 'accounts:logout' %}" method="post" class="d-inline w-100">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>
