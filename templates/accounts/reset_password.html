<!DOCTYPE html>
{% load static %}
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat lai mat khau - TechStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0077B6; --primary-dark: #005f8a; --primary-light: #00B4D8;
            --accent: #023E8A; --accent-light: #0096C7; --surface: #ffffff;
            --surface-alt: #F0F8FF; --text-primary: #1a1a2e; --text-secondary: #5C6B7A;
            --text-muted: #9CA8B3; --border: #E1E8ED; --success: #10B981;
            --success-dark: #059669; --danger: #EF4444; --warning: #F59E0B;
            --warning-dark: #D97706; --radius-sm: 8px; --radius-md: 12px;
            --radius-lg: 16px; --radius-xl: 24px; --shadow-lg: 0 25px 50px rgba(0,0,0,0.15);
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 50%, var(--primary-light) 100%);
            min-height: 100vh; font-family: 'Be Vietnam Pro', sans-serif;
        }
        .back-to-home { position:fixed; top:20px; left:20px; z-index:1000; }
        .back-to-home .btn {
            background: rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3);
            color:white; backdrop-filter:blur(10px); border-radius:var(--radius-md);
            padding:8px 16px; font-weight:600; font-size:13px;
            display:inline-flex; align-items:center; gap:6px; text-decoration:none; transition:var(--transition);
        }
        .back-to-home .btn:hover { background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.5); transform:translateY(-2px); color:white; }
        .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:80px 20px 40px; position:relative; overflow:hidden; }
        .auth-container::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%); animation:pulseGlow 8s ease-in-out infinite; pointer-events:none; }
        @keyframes pulseGlow { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
        .auth-card { background:white; border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:48px 40px; width:100%; max-width:460px; animation:slideUp 0.6s ease-out; position:relative; z-index:1; border:1px solid rgba(255,255,255,0.2); }
        @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
        .auth-header { text-align:center; margin-bottom:32px; }
        .auth-icon-wrapper { width:72px; height:72px; background:linear-gradient(135deg, var(--success) 0%, #34d399 100%); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:white; font-size:28px; box-shadow:0 8px 25px rgba(16,185,129,0.35); }
        .auth-title { color:var(--accent); font-weight:800; margin-bottom:6px; font-size:26px; }
        .auth-subtitle { color:var(--text-secondary); margin-bottom:0; font-size:14px; }
        .input-group-custom { position:relative; margin-bottom:16px; }
        .input-icon-wrapper { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:16px; z-index:2; transition:var(--transition); pointer-events:none; }
        .input-with-icon { width:100%; border:2px solid var(--border); border-radius:var(--radius-md); padding:14px 16px 14px 48px; font-size:15px; font-family:'Be Vietnam Pro', sans-serif; transition:var(--transition); background:var(--surface-alt); color:var(--text-primary); }
        .input-with-icon:focus { outline:none; border-color:var(--success); background:white; box-shadow:0 0 0 4px rgba(16,185,129,0.1); }
        .input-group-custom:focus-within .input-icon-wrapper { color:var(--success); }
        .btn-auth-submit { width:100%; padding:14px; background:linear-gradient(135deg, var(--success) 0%, #34d399 100%); color:white; border:none; border-radius:var(--radius-md); font-size:16px; font-weight:700; font-family:'Be Vietnam Pro', sans-serif; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 15px rgba(16,185,129,0.3); margin-top:8px; }
        .btn-auth-submit:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(16,185,129,0.4); color:white; }
        .alert-msg { padding:12px 16px; border-radius:var(--radius-md); font-weight:600; font-size:14px; display:flex; align-items:center; gap:8px; margin-bottom:20px; }
        .alert-danger-msg { background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
        .alert-success-msg { background:rgba(16,185,129,0.1); color:var(--success); border:1px solid rgba(16,185,129,0.2); }
        .btn-back-login { width:100%; padding:14px; background:transparent; color:var(--primary); border:2px solid var(--primary); border-radius:var(--radius-md); font-size:16px; font-weight:700; font-family:'Be Vietnam Pro', sans-serif; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; margin-top:12px; }
        .btn-back-login:hover { background:var(--primary); color:white; }
        @media(max-width:575px){ .auth-card { padding:36px 24px; } .auth-title{font-size:22px} .auth-icon-wrapper{width:60px;height:60px;font-size:24px} }
    </style>
</head>
<body>
    <div class="back-to-home">
        <a href="{% url 'shop:home' %}"><i class="fas fa-arrow-left"></i>Ve trang chu</a>
    </div>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon-wrapper">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="auth-title">Dat lai mat khau</h2>
                <p class="auth-subtitle">Nhap mat khau moi cho tai khoan cua ban</p>
            </div>
            {% if messages %}
                {% for message in messages %}
                <div class="alert-msg {% if message.tags == 'error' %}alert-danger-msg{% else %}alert-success-msg{% endif %}">
                    {% if message.tags == 'error' %}<i class="fas fa-exclamation-triangle"></i>{% else %}<i class="fas fa-check-circle"></i>{% endif %}
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            <form method="POST" class="auth-form">
                {% csrf_token %}
                <div class="input-group-custom">
                    <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                    <input type="password" name="password" class="input-with-icon" placeholder="Mat khau moi" required minlength="6" />
                </div>
                <div class="input-group-custom">
                    <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                    <input type="password" name="password2" class="input-with-icon" placeholder="Xac nhan mat khau moi" required minlength="6" />
                </div>
                <button type="submit" class="btn-auth-submit">
                    <i class="fas fa-key"></i>Dat lai mat khau
                </button>
                <a href="{% url 'accounts:login' %}" class="btn-back-login">
                    <i class="fas fa-arrow-left"></i>Quay lai dang nhap
                </a>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
