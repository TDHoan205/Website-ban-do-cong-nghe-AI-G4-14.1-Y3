{% extends "layouts/base.html" %}

{% block content %}
<div class="container py-5">
    <div style="text-align: center; padding: 80px 0;">
        <div style="font-size: 8rem; font-weight: 900; color: var(--primary-lightest); line-height: 1; margin-bottom: 16px;">404</div>
        <h1 style="font-weight: 800; font-size: 1.8rem; margin-bottom: 12px;">Không tìm thấy trang!</h1>
        <p style="color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto;">
            Trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển. Vui lòng kiểm tra lại URL.
        </p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <a href="/" style="background: var(--primary); color: white; padding: 12px 24px; border-radius: var(--radius-md); font-weight: 700; text-decoration: none;">
                <i class="fas fa-home me-2"></i>Về trang chủ
            </a>
            <a href="/products" style="background: white; color: var(--primary); padding: 12px 24px; border-radius: var(--radius-md); font-weight: 700; text-decoration: none; border: 2px solid var(--primary);">
                <i class="fas fa-th me-2"></i>Xem sản phẩm
            </a>
        </div>
    </div>
</div>
{% endblock %}
