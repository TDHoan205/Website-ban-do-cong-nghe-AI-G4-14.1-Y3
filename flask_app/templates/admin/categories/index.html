{% extends "layouts/admin.html" %}

{% block content %}
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-size:1.3rem;font-weight:800;"><i class="fas fa-tags me-2 text-primary"></i>Quan ly Danh muc</h2>
                <a href="#" class="btn btn-success btn-sm"><i class="fas fa-plus me-1"></i> Them moi</a>
            </div>
            <div class="card">
                <table class="table">
                    <thead><tr><th>#</th><th>Ten danh muc</th><th>Mo ta</th><th class="text-center">Thao tac</th></tr></thead>
                    <tbody>
                        {% for cat in categories %}
                        <tr>
                            <td>{{ cat.category_id }}</td>
                            <td><strong>{{ cat.name }}</strong></td>
                            <td style="color:#9CA8B3;">{{ cat.description or '-' }}</td>
                            <td class="text-center">
                                <a href="#" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i></a>
                                <a href="#" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
{% endblock %}
