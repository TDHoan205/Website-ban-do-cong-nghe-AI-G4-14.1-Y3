{% extends "layouts/admin.html" %}

{% block content %}
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-size:1.3rem;font-weight:800;"><i class="fas fa-truck me-2 text-primary"></i>Quan ly Nha cung cap</h2>
                <a href="#" class="btn btn-success btn-sm"><i class="fas fa-plus me-1"></i> Them moi</a>
            </div>
            <div class="card">
                <table class="table">
                    <thead><tr><th>#</th><th>Ten NCC</th><th>Lien he</th><th>Dien thoai</th><th>Email</th><th>Dia chi</th><th class="text-center">Thao tac</th></tr></thead>
                    <tbody>
                        {% for sup in suppliers %}
                        <tr>
                            <td>{{ sup.supplier_id }}</td>
                            <td><strong>{{ sup.name }}</strong></td>
                            <td>{{ sup.contact_name }}</td>
                            <td style="color:#9CA8B3;">{{ sup.phone }}</td>
                            <td style="color:#9CA8B3;font-size:.85rem;">{{ sup.email }}</td>
                            <td style="color:#9CA8B3;font-size:.85rem;">{{ sup.address }}</td>
                            <td class="text-center">
                                <a href="#" class="btn btn-primary btn-sm"><i class="fas fa-edit"></i></a>
                                <a href="#" class="btn btn-sm" style="background:rgba(239,68,68,.1);color:#e63946;"><i class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
{% endblock %}
