{% extends "layouts/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="fas fa-user me-2"></i>Thông tin cá nhân</h1>
        <p class="page-subtitle mb-0">Quản lý thông tin tài khoản của bạn</p>
    </div>
</div>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-user me-2"></i>Thông tin tài khoản
                </div>
                <div class="card-body">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" class="form-control" value="{{ current_user }}" readonly />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="demo@webstore.vn" readonly />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" value="0901234567" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" class="form-control" value="Hà Nội, Việt Nam" />
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-cog me-2"></i>Cài đặt
                </div>
                <div class="card-body">
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <a href="/shop/orders" class="btn btn-outline-primary w-100 text-start">
                            <i class="fas fa-receipt me-2"></i>Lịch sử đơn hàng
                        </a>
                        <a href="/shop/cart" class="btn btn-outline-primary w-100 text-start">
                            <i class="fas fa-shopping-cart me-2"></i>Giỏ hàng
                        </a>
                        <a href="/auth/logout" class="btn btn-danger w-100 text-start">
                            <i class="fas fa-sign-out-alt me-2"></i>Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
