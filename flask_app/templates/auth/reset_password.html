{% extends "layouts/auth.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 420px;">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="auth-icon-wrapper">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="auth-title">Đặt lại mật khẩu</h2>
                <p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>
            </div>
        </div>

        <form method="post" class="auth-form">
            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                <input name="password" type="password" class="input-with-icon" placeholder="Mật khẩu mới" required />
            </div>

            <div class="input-group-custom mb-4">
                <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                <input name="confirm_password" type="password" class="input-with-icon" placeholder="Xác nhận mật khẩu mới" required />
            </div>

            <button type="submit" class="btn btn-auth-submit mb-3">
                <i class="fas fa-save"></i>Đặt lại mật khẩu
            </button>
        </form>

        <div class="text-center">
            <a href="/auth/login" class="text-link">
                <i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập
            </a>
        </div>
    </div>
</div>
{% endblock %}
