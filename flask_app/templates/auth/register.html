{% extends "layouts/auth.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="auth-icon-wrapper">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2 class="auth-title">Tạo tài khoản mới</h2>
                <p class="auth-subtitle">Đăng ký để bắt đầu mua sắm</p>
            </div>
        </div>

        {% if success %}
        <div class="alert-msg alert-success-msg">
            <i class="fas fa-check-circle"></i>{{ success }}
        </div>
        {% endif %}

        <form method="post" action="/auth/register" class="auth-form">
            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-user"></i></div>
                <input name="username" class="input-with-icon" placeholder="Tên đăng nhập" required />
            </div>

            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-envelope"></i></div>
                <input name="email" type="email" class="input-with-icon" placeholder="Email" required />
            </div>

            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-id-card"></i></div>
                <input name="full_name" class="input-with-icon" placeholder="Họ và tên" required />
            </div>

            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                <input name="password" type="password" class="input-with-icon" placeholder="Mật khẩu" required />
            </div>

            <div class="input-group-custom mb-3">
                <div class="input-icon-wrapper"><i class="fas fa-lock"></i></div>
                <input name="confirm_password" type="password" class="input-with-icon" placeholder="Xác nhận mật khẩu" required />
            </div>

            <button type="submit" class="btn btn-auth-submit mb-3">
                <i class="fas fa-user-plus"></i>Đăng ký
            </button>

            <div class="text-center">
                <p class="auth-form-footer mb-0">Đã có tài khoản?
                    <a href="/auth/login" class="text-link">Đăng nhập ngay</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
