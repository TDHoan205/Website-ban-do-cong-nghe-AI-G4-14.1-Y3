{% extends "layouts/auth.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 420px;">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="auth-icon-wrapper">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="auth-title">Quên mật khẩu?</h2>
                <p class="auth-subtitle">Nhập email để nhận liên kết đặt lại mật khẩu</p>
            </div>
        </div>

        {% if success %}
        <div class="alert-msg alert-success-msg">
            <i class="fas fa-check-circle"></i>{{ success }}
        </div>
        {% endif %}

        <form method="post" action="/auth/forgot-password" class="auth-form">
            <div class="input-group-custom mb-4">
                <div class="input-icon-wrapper"><i class="fas fa-envelope"></i></div>
                <input name="email" type="email" class="input-with-icon" placeholder="Địa chỉ email của bạn" required />
            </div>

            <button type="submit" class="btn btn-auth-submit mb-3">
                <i class="fas fa-paper-plane"></i>Gửi liên kết
            </button>
        </form>

        <div class="text-center">
            <a href="/auth/login" class="text-link">
                <i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập
            </a>
        </div>
    </div>
</div>
{% endblock %}
