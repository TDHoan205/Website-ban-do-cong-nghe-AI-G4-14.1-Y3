<div class="container py-4">
  <div class="row">
    <!-- Sidebar - Categories -->
    <aside class="col-lg-3 mb-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="fas fa-filter"></i> Bộ lọc</h5>
        </div>
        <div class="card-body">
          <h6>Danh mục</h6>
          <ul class="list-group list-group-flush">
            <li class="list-group-item">
              <a
                href="/Products/"
                class="text-decoration-none fw-bold text-primary"
              >
                <i class="fas fa-th"></i> Tat ca san pham
              </a>
            </li>
            <li class="list-group-item">
              <a href="/Products/?category_id=1" class="text-decoration-none">
                Laptop
              </a>
            </li>
            <li class="list-group-item">
              <a href="/Products/?category_id=2" class="text-decoration-none">
                Dien thoai
              </a>
            </li>
          </ul>
        </div>
      </div>
    </aside>

    <!-- Products Grid -->
    <main class="col-lg-9">
      <!-- Search & Sort -->
      <div class="card mb-4">
        <div class="card-body">
          <form method="GET" action="/Products/" class="row g-3">
            <div class="col-md-6">
              <div class="input-group">
                <input
                  type="text"
                  name="search"
                  class="form-control"
                  placeholder="Tim kiem san pham..."
                  value=""
                />
                <button class="btn btn-primary" type="submit">
                  <i class="fas fa-search"></i>
                </button>
              </div>
            </div>
            <div class="col-md-3">
              <select name="sort_by" class="form-select">
                <option value="created_at" selected>Moi nhat</option>
                <option value="price">Gia</option>
                <option value="name">Ten A-Z</option>
                <option value="rating">Danh gia</option>
              </select>
            </div>
            <div class="col-md-3">
              <select name="sort_order" class="form-select">
                <option value="desc" selected>Giam dan</option>
                <option value="asc">Tang dan</option>
              </select>
            </div>
          </form>
        </div>
      </div>

      <!-- Results -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="mb-0 text-muted">Hien thi 4 / 4 san pham</p>
      </div>

      <!-- Products -->
      <div class="row">
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="product-card card h-100 shadow-sm position-relative">
            <span class="badge bg-danger position-absolute top-0 end-0 m-2"
              >Hot</span
            >
            <span class="badge bg-success position-absolute top-0 start-0 m-2"
              >Moi</span
            >

            <a href="/Products/1">
              <img
                src="/static/images/no-image.png"
                class="card-img-top product-image"
                alt="San pham mau"
                onerror="this.src = '/static/images/no-image.png'"
              />
            </a>

            <div class="card-body text-center">
              <h6 class="card-title">
                <a href="/Products/1" class="text-decoration-none text-dark">
                  San pham mau
                </a>
              </h6>
              <p class="text-muted small">Danh muc mau</p>

              <div class="rating mb-2">
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star text-secondary"></i>
                <i class="fas fa-star text-secondary"></i>
              </div>

              <div class="price-section mb-2">
                <span class="current-price text-danger fw-bold fs-5">
                  12,000,000 đ
                </span>
              </div>

              <form action="/Products/1/add-to-cart" method="POST">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
