<div class="container py-4">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
      <li class="breadcrumb-item"><a href="/Products/">Sản phẩm</a></li>
      <li class="breadcrumb-item active">San pham mau</li>
    </ol>
  </nav>

  <div class="row">
    <!-- Images -->
    <div class="col-lg-6 mb-4">
      <div class="card">
        <img
          src="/static/images/no-image.png"
          class="card-img-top"
          alt="San pham mau"
          id="main-image"
          onerror="this.src = '/static/images/no-image.png'"
        />
      </div>
    </div>

    <!-- Info -->
    <div class="col-lg-6">
      <h1 class="mb-3">San pham mau</h1>

      <div class="mb-3">
        <span class="badge bg-primary">Danh muc mau</span>
        <span class="badge bg-success">Moi</span>
        <span class="badge bg-danger">Hot</span>
      </div>

      <div class="rating mb-3">
        <i class="fas fa-star text-warning"></i>
        <i class="fas fa-star text-warning"></i>
        <i class="fas fa-star text-warning"></i>
        <i class="fas fa-star text-secondary"></i>
        <i class="fas fa-star text-secondary"></i>
        <span class="text-muted">(4.5 sao)</span>
      </div>

      <div class="price-section mb-4">
        <span class="current-price text-danger fs-2 fw-bold">12,000,000 đ</span>
        <br />
        <span
          class="original-price text-muted text-decoration-line-through fs-5"
          >14,000,000 đ</span
        >
        <span class="badge bg-warning text-dark ms-2">-15%</span>
      </div>

      <div class="mb-3">
        <p class="text-muted"><i class="fas fa-box"></i> Con 10 san pham</p>
      </div>
      <div class="mb-4">
        <h5>Mô tả:</h5>
        <p>Mo ta san pham mau.</p>
      </div>

      <!-- Add to Cart -->
      <form action="/Products/1/add-to-cart" method="POST" class="mb-4">
        <div class="row g-3 align-items-center mb-3">
          <div class="col-auto">
            <label class="col-form-label">Số lượng:</label>
          </div>
          <div class="col-auto">
            <div class="input-group" style="width: 130px">
              <button
                type="button"
                class="btn btn-outline-secondary"
                onclick="decreaseQty()"
              >
                -
              </button>
              <input
                type="number"
                name="quantity"
                id="quantity"
                class="form-control text-center"
                value="1"
                min="1"
              />
              <button
                type="button"
                class="btn btn-outline-secondary"
                onclick="increaseQty()"
              >
                +
              </button>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
            <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
          </button>
          <a
            href="/Chat/?q=Toi+muon+hoi+ve+san+pham+mau"
            class="btn btn-outline-primary btn-lg"
          >
            <i class="fas fa-robot"></i> Hỏi AI
          </a>
        </div>
      </form>

      <!-- AI Suggestion -->
      <div class="card bg-light">
        <div class="card-body">
          <h6>
            <i class="fas fa-robot text-primary"></i> Bạn có câu hỏi về sản phẩm
            này?
          </h6>
          <a
            href="/Chat/?q=So+sanh+san+pham+mau"
            class="btn btn-sm btn-outline-primary"
            >So sanh san pham</a
          >
          <a
            href="/Chat/?q=Tu+van+mua+san+pham+mau"
            class="btn btn-sm btn-outline-info"
            >Tu van mua hang</a
          >
        </div>
      </div>
    </div>
  </div>

  <!-- Related Products -->
  <div class="row mt-5">
    <div class="col-12">
      <h3><i class="fas fa-th-large"></i> Sản phẩm liên quan</h3>
      <div class="row">
        <div class="col-lg-3 col-md-6 mb-4">
          <div class="card h-100">
            <a href="/Products/2">
              <img
                src="/static/images/no-image.png"
                class="card-img-top product-image"
                alt="San pham lien quan"
                onerror="this.src = '/static/images/no-image.png'"
              />
            </a>
            <div class="card-body text-center">
              <h6>
                <a href="/Products/2" class="text-decoration-none text-dark"
                  >San pham lien quan</a
                >
              </h6>
              <p class="text-danger fw-bold">8,500,000 đ</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function decreaseQty() {
    const qty = document.getElementById("quantity");
    if (parseInt(qty.value) > 1) qty.value = parseInt(qty.value) - 1;
  }
  function increaseQty() {
    const qty = document.getElementById("quantity");
    qty.value = parseInt(qty.value) + 1;
  }
</script>
