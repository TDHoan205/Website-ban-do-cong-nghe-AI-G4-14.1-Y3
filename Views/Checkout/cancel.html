<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanh toán - Tech Store AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/checkout.css" />
</head>
<body class="checkout-status-page">
  <div class="checkout-status-card">
    <div class="checkout-status-icon danger">
      <i class="fas fa-xmark-circle"></i>
    </div>
    <h2 class="checkout-status-title">Thanh toán đã hủy</h2>
    <p class="checkout-status-msg">
      Thanh toán cho đơn hàng <strong>{{ order_id }}</strong> đã bị hủy.
      Giỏ hàng của bạn vẫn được giữ nguyên.
    </p>
    <div class="checkout-status-actions">
      <a href="/Checkout/" class="checkout-status-btn checkout-status-btn-primary">
        <i class="fas fa-redo"></i> Thử lại thanh toán
      </a>
      <a href="/" class="checkout-status-btn checkout-status-btn-secondary">
        <i class="fas fa-shopping-cart"></i> Quay lại giỏ hàng
      </a>
    </div>
  </div>
</body>
</html>
