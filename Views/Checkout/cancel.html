<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanh toán - Tech Store AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/checkout.css" />
</head>
<body style="background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="text-center" style="max-width:480px">
    <div style="width:80px;height:80px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2.5rem;color:#ef4444;">
      <i class="fas fa-times-circle"></i>
    </div>
    <h2 style="font-weight:800;color:#111827;margin-bottom:10px">Thanh toán đã hủy</h2>
    <p style="color:#6b7280;margin-bottom:28px">
      Thanh toán cho đơn hàng <strong>{{ order_id }}</strong> đã bị hủy.
      Giỏ hàng của bạn vẫn được giữ nguyên.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="/Checkout/" class="btn-continue" style="display:inline-block">
        <i class="fas fa-redo me-1"></i> Thử lại thanh toán
      </a>
      <a href="/Cart/" class="btn-continue" style="display:inline-block;background:#6b7280;box-shadow:none">
        <i class="fas fa-shopping-cart me-1"></i> Quay lại giỏ hàng
      </a>
    </div>
  </div>
</body>
</html>
