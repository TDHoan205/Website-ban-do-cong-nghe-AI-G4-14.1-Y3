<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Chat - Tech Store Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Be Vietnam Pro',sans-serif;background:#152A45;color:#FFFFFF;min-height:100vh;}
.admin-topbar{background:#1E3A5F;border-bottom:1px solid #2D4A6F;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:24px;}
.admin-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;}
.admin-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#4DA6FF,#2196F3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#152A45;}
.admin-logo-name{font-size:1.05rem;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none;transition:all 0.2s;font-family:'Be Vietnam Pro',sans-serif;}
.btn-gold{background:rgba(77,166,255,0.1);border:1px solid rgba(77,166,255,0.3);color:#4DA6FF;}
.btn-gold:hover{background:rgba(77,166,255,0.2);color:#4DA6FF;}
.btn-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;}
.btn-red:hover{background:rgba(239,68,68,0.2);color:#ef4444;}
.topbar-user{display:flex;align-items:center;gap:10px;padding:6px 12px;background:rgba(255,255,255,0.06);border-radius:8px;}
.user-avatar{width:34px;height:34px;background:linear-gradient(135deg,#1a2a3a,#152A45);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#4DA6FF;font-size:0.85rem;}
.user-name{font-size:0.85rem;font-weight:600;color:white;line-height:1.2;}
.user-role{font-size:0.68rem;color:#4DA6FF;font-weight:600;}
.admin-body{display:flex;flex:1;}
.admin-sidebar{width:230px;background:#1E3A5F;border-right:1px solid #2D4A6F;flex-shrink:0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;padding:16px 0;}
.sidebar-section{margin-bottom:4px;}
.sidebar-section-title{font-size:0.65rem;font-weight:700;color:#5C7A99;text-transform:uppercase;letter-spacing:1.2px;padding:10px 20px 4px;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 20px;color:#80C7FF;font-size:0.86rem;font-weight:500;text-decoration:none;transition:all 0.15s;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(255,255,255,0.04);color:#FFFFFF;border-left-color:#4DA6FF;}
.sidebar-link.active{background:rgba(77,166,255,0.08);color:#4DA6FF;border-left-color:#4DA6FF;}
.sidebar-link i{width:18px;text-align:center;font-size:0.82rem;flex-shrink:0;}
.admin-main{flex:1;padding:28px 32px;}
.page-title{font-size:1.2rem;font-weight:700;color:white;margin-bottom:20px;}

/* LiveChat Specific CSS */
.livechat-layout{display:flex;gap:16px;min-height:70vh}
.lc-sidebar{width:320px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow-y:auto;max-height:75vh}
.lc-section{padding:12px}
.lc-section-title{font-size:.82rem;font-weight:700;color:#80C7FF;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lc-badge{background:#ef4444;color:#fff;border-radius:999px;padding:2px 8px;font-size:.7rem;font-weight:800}
.lc-list{display:flex;flex-direction:column;gap:6px}
.lc-item{padding:12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .15s}
.lc-item:hover{background:rgba(77,166,255,.1);border-color:rgba(77,166,255,.3)}
.lc-item.active{background:rgba(77,166,255,.15);border-color:#4DA6FF}
.lc-item-name{font-weight:700;font-size:.88rem;color:#E6F2FF}
.lc-item-subject{font-size:.75rem;color:#80C7FF;margin-top:2px}
.lc-item-time{font-size:.68rem;color:#5C6F82;margin-top:4px}
.lc-chat-panel{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;display:flex;flex-direction:column;overflow:hidden}
.lc-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#5C6F82;gap:8px}
.lc-empty i{font-size:3rem;opacity:.3}
.lc-chat-box{flex:1;display:flex;flex-direction:column}
.lc-chat-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;gap:12px}
.lc-chat-user{font-weight:700;font-size:.92rem;color:#E6F2FF;display:flex;align-items:center;gap:8px}
.lc-chat-actions{display:flex;align-items:center;gap:8px}
.lc-status-badge{padding:4px 12px;border-radius:999px;font-size:.72rem;font-weight:700}
.lc-status-badge.waiting{background:rgba(250,204,21,.15);color:#facc15}
.lc-status-badge.active{background:rgba(34,197,94,.15);color:#22c55e}
.lc-status-badge.closed{background:rgba(148,163,184,.15);color:#94a3b8}
.lc-btn{padding:6px 14px;border-radius:10px;border:none;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.lc-btn-accept{background:rgba(34,197,94,.15);color:#22c55e}.lc-btn-accept:hover{background:rgba(34,197,94,.25)}
.lc-btn-close{background:rgba(239,68,68,.15);color:#ef4444}.lc-btn-close:hover{background:rgba(239,68,68,.25)}
.lc-messages{flex:1;overflow-y:auto;padding:16px;min-height:300px;max-height:55vh;scroll-behavior:smooth}
.lc-msg{display:flex;margin-bottom:12px;animation:lcFade .25s ease}
@keyframes lcFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lc-msg.staff{flex-direction:row-reverse}
.lc-msg-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:.84rem;line-height:1.5;word-break:break-word}
.lc-msg.customer .lc-msg-bubble{background:rgba(255,255,255,.08);color:#E6F2FF;border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px}
.lc-msg.staff .lc-msg-bubble{background:linear-gradient(135deg,#4DA6FF,#2196F3);color:#fff;border-bottom-right-radius:4px}
.lc-msg.system .lc-msg-bubble{background:rgba(250,204,21,.08);color:#facc15;border:1px solid rgba(250,204,21,.15);font-size:.78rem;font-style:italic;margin:0 auto;text-align:center;max-width:90%}
.lc-msg-time{font-size:.65rem;color:#5C6F82;margin-top:3px;padding:0 4px}
.lc-msg.staff .lc-msg-time{text-align:right}
.lc-input-area{padding:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px}
.lc-input-area input{flex:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:999px;padding:10px 18px;color:#E6F2FF;font-size:.85rem;outline:none;font-family:inherit}
.lc-input-area input:focus{border-color:#4DA6FF;box-shadow:0 0 0 3px rgba(77,166,255,.15)}
.lc-input-area button{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#4DA6FF,#2196F3);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.88rem}
@media(max-width:900px){.admin-sidebar{width:190px;}}
@media(max-width:768px){.livechat-layout{flex-direction:column}.lc-sidebar{width:100%;max-height:200px}}
@media(max-width:640px){.admin-sidebar{display:none;}.admin-main{padding:16px;}}
</style>
</head>
<body class="admin-page">
{% include "partials/admin_shell.html" %}
<main class="admin-main">
<div class="page-header"><h1 class="page-title"><i class="fas fa-headset"></i> Live Chat</h1></div>

<div class="livechat-layout" id="lc-layout">
  <!-- LEFT: Conversation List -->
  <div class="lc-sidebar">
    <div class="lc-section">
      <div class="lc-section-title"><i class="fas fa-clock text-warning"></i> Đang chờ <span class="lc-badge" id="lc-waiting-badge">0</span></div>
      <div id="lc-waiting-list" class="lc-list"></div>
    </div>
    <div class="lc-section">
      <div class="lc-section-title"><i class="fas fa-comments text-success"></i> Đang hỗ trợ</div>
      <div id="lc-active-list" class="lc-list"></div>
    </div>
  </div>

  <!-- RIGHT: Chat Panel -->
  <div class="lc-chat-panel" id="lc-chat-panel">
    <div class="lc-empty" id="lc-empty">
      <i class="fas fa-headset"></i>
      <h5>Chọn cuộc hội thoại</h5>
      <p>Chọn một cuộc hội thoại bên trái để bắt đầu hỗ trợ khách hàng</p>
    </div>
    <div class="lc-chat-box" id="lc-chat-box" style="display:none">
      <div class="lc-chat-header" id="lc-chat-header">
        <div class="lc-chat-user"><i class="fas fa-user-circle"></i> <span id="lc-chat-name">Khách hàng</span></div>
        <div class="lc-chat-actions">
          <span class="lc-status-badge" id="lc-status-badge">waiting</span>
          <button class="lc-btn lc-btn-accept" id="lc-btn-accept" onclick="lcAccept()"><i class="fas fa-check"></i> Nhận hỗ trợ</button>
          <button class="lc-btn lc-btn-close" id="lc-btn-close" onclick="lcClose()" style="display:none"><i class="fas fa-times"></i> Kết thúc</button>
        </div>
      </div>
      <div class="lc-messages" id="lc-messages"></div>
      <div class="lc-input-area" id="lc-input-area" style="display:none">
        <input type="text" id="lc-input" placeholder="Nhập tin nhắn..." autocomplete="off"/>
        <button id="lc-send" onclick="lcSendMsg()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
var currentConvId=null,lastMsgId=0,pollTimer=null,listPollTimer=null;
var lastWaitingCount = 0;

function playPingSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5 note
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12); // A5 note
    
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch (e) {
    console.error("Audio synth failed", e);
  }
}

function lcEsc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function lcSelectConv(id,name,status){
  currentConvId=id;lastMsgId=0;
  document.getElementById('lc-empty').style.display='none';
  document.getElementById('lc-chat-box').style.display='flex';
  document.getElementById('lc-chat-name').textContent=name;
  document.getElementById('lc-messages').innerHTML='';
  lcUpdateStatus(status);
  document.querySelectorAll('.lc-item').forEach(function(el){el.classList.remove('active')});
  var sel=document.querySelector('.lc-item[data-id="'+id+'"]');
  if(sel)sel.classList.add('active');
  lcLoadMessages();
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(lcPollMessages,3000);
}

function lcUpdateStatus(status){
  var badge=document.getElementById('lc-status-badge');
  badge.textContent=status==='waiting'?'Đang chờ':status==='active'?'Đang hỗ trợ':'Đã kết thúc';
  badge.className='lc-status-badge '+status;
  document.getElementById('lc-btn-accept').style.display=status==='waiting'?'flex':'none';
  document.getElementById('lc-btn-close').style.display=status==='active'?'flex':'none';
  document.getElementById('lc-input-area').style.display=status==='active'?'flex':'none';
}

async function lcLoadMessages(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Messages/'+currentConvId+'?after_id=0');
    var d=await r.json();
    if(d.success){
      var box=document.getElementById('lc-messages');box.innerHTML='';
      d.messages.forEach(function(m){lcAddMsg(m)});
      if(d.messages.length)lastMsgId=d.messages[d.messages.length-1].message_id;
      lcUpdateStatus(d.status);
      box.scrollTop=box.scrollHeight;
    }
  }catch(e){}
}

async function lcPollMessages(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Messages/'+currentConvId+'?after_id='+lastMsgId);
    var d=await r.json();
    if(d.success&&d.messages.length){
      d.messages.forEach(function(m){lcAddMsg(m)});
      lastMsgId=d.messages[d.messages.length-1].message_id;
      var box=document.getElementById('lc-messages');box.scrollTop=box.scrollHeight;
    }
    if(d.status)lcUpdateStatus(d.status);
  }catch(e){}
}

function lcAddMsg(m){
  var div=document.createElement('div');
  div.className='lc-msg '+m.sender_type;
  div.innerHTML='<div><div class="lc-msg-bubble">'+lcEsc(m.content)+'</div><div class="lc-msg-time">'+lcEsc(m.created_at)+'</div></div>';
  document.getElementById('lc-messages').appendChild(div);
}

async function lcAccept(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Accept/'+currentConvId,{method:'POST'});
    var d=await r.json();
    if(d.success){
      lcUpdateStatus('active');
      lcPollList();
      // Reload message list immediately to update system notification
      lcLoadMessages();
    }
  }catch(e){}
}

async function lcSendMsg(){
  var input=document.getElementById('lc-input');
  var msg=input.value.trim();if(!msg||!currentConvId)return;
  input.value='';
  try{
    var r=await fetch('/Admin/API/LiveChat/Send/'+currentConvId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    var d=await r.json();
    if(d.success)lcPollMessages();
  }catch(e){}
}

async function lcClose(){
  if(!currentConvId||!confirm('Kết thúc cuộc hội thoại?'))return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Close/'+currentConvId,{method:'POST'});
    var d=await r.json();
    if(d.success){
      lcUpdateStatus('closed');
      lcPollList();
      // Reload message list immediately to update system notification
      lcLoadMessages();
    }
  }catch(e){}
}

function lcRenderList(data){
  var wl=document.getElementById('lc-waiting-list');wl.innerHTML='';
  var al=document.getElementById('lc-active-list');al.innerHTML='';
  document.getElementById('lc-waiting-badge').textContent=data.waiting.length;
  
  if (data.waiting.length > lastWaitingCount) {
    playPingSound();
  }
  lastWaitingCount = data.waiting.length;

  data.waiting.forEach(function(c){
    var d=document.createElement('div');d.className='lc-item'+(currentConvId===c.conversation_id?' active':'');
    d.dataset.id=c.conversation_id;
    d.innerHTML='<div class="lc-item-name"><i class="fas fa-user-circle"></i> '+lcEsc(c.customer_name)+'</div><div class="lc-item-subject">'+lcEsc(c.subject)+'</div><div class="lc-item-time">'+lcEsc(c.created_at)+'</div>';
    d.onclick=function(){lcSelectConv(c.conversation_id,c.customer_name,'waiting')};
    wl.appendChild(d);
  });
  data.active.forEach(function(c){
    var d=document.createElement('div');d.className='lc-item'+(currentConvId===c.conversation_id?' active':'');
    d.dataset.id=c.conversation_id;
    d.innerHTML='<div class="lc-item-name"><i class="fas fa-user-circle"></i> '+lcEsc(c.customer_name)+'</div><div class="lc-item-subject">'+lcEsc(c.subject)+'</div><div class="lc-item-time">'+lcEsc(c.created_at)+'</div>';
    d.onclick=function(){lcSelectConv(c.conversation_id,c.customer_name,'active')};
    al.appendChild(d);
  });
}

async function lcPollList(){
  try{
    var r=await fetch('/Admin/API/LiveChat/Waiting');
    var d=await r.json();
    if(d.success)lcRenderList(d);
  }catch(e){}
}

document.getElementById('lc-input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();lcSendMsg()}});

lcPollList();
listPollTimer=setInterval(lcPollList,5000);
</script>
</main>
</div>
{% include "partials/admin_finance_widget.html" %}
{% include "partials/chatbot.html" %}
</body>
</html>
