<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Chat - Tech Store Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="/static/css/admin/livechat.css" />
</head>
<body class="admin-page">
{% include "partials/admin_shell.html" %}
<main class="admin-main">
<div class="page-header"><h1 class="page-title"><i class="fas fa-headset"></i> Live Chat</h1></div>

<div class="livechat-layout" id="lc-layout">
  <!-- LEFT: Conversation List -->
  <div class="lc-sidebar">
    <div class="lc-section">
      <div class="lc-section-title"><i class="fas fa-clock text-warning"></i> Đang chờ <span class="lc-badge" id="lc-waiting-badge">0</span></div>
      <div id="lc-waiting-list" class="lc-list"></div>
    </div>
    <div class="lc-section">
      <div class="lc-section-title"><i class="fas fa-comments text-success"></i> Đang hỗ trợ</div>
      <div id="lc-active-list" class="lc-list"></div>
    </div>
  </div>

  <!-- RIGHT: Chat Panel -->
  <div class="lc-chat-panel" id="lc-chat-panel">
    <div class="lc-empty" id="lc-empty">
      <i class="fas fa-headset"></i>
      <h5>Chọn cuộc hội thoại</h5>
      <p>Chọn một cuộc hội thoại bên trái để bắt đầu hỗ trợ khách hàng</p>
    </div>
    <div class="lc-chat-box" id="lc-chat-box" style="display:none">
      <div class="lc-chat-header" id="lc-chat-header">
        <div class="lc-chat-user"><i class="fas fa-user-circle"></i> <span id="lc-chat-name">Khách hàng</span></div>
        <div class="lc-chat-actions">
          <span class="lc-status-badge" id="lc-status-badge">waiting</span>
          <button class="lc-btn lc-btn-accept" id="lc-btn-accept" onclick="lcAccept()"><i class="fas fa-check"></i> Nhận hỗ trợ</button>
          <button class="lc-btn lc-btn-close" id="lc-btn-close" onclick="lcClose()" style="display:none"><i class="fas fa-xmark"></i> Kết thúc</button>
        </div>
      </div>
      <div class="lc-messages" id="lc-messages"></div>
      <div class="lc-input-area" id="lc-input-area" style="display:none">
        <input type="text" id="lc-input" placeholder="Nhập tin nhắn..." autocomplete="off"/>
        <button id="lc-send" onclick="lcSendMsg()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
var currentConvId=null,lastMsgId=0,pollTimer=null,listPollTimer=null;
var lastWaitingCount = 0;

function playPingSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5 note
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12); // A5 note
    
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch (e) {
    console.error("Audio synth failed", e);
  }
}

function lcEsc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function lcSelectConv(id,name,status){
  currentConvId=id;lastMsgId=0;
  document.getElementById('lc-empty').style.display='none';
  document.getElementById('lc-chat-box').style.display='flex';
  document.getElementById('lc-chat-name').textContent=name;
  document.getElementById('lc-messages').innerHTML='';
  lcUpdateStatus(status);
  document.querySelectorAll('.lc-item').forEach(function(el){el.classList.remove('active')});
  var sel=document.querySelector('.lc-item[data-id="'+id+'"]');
  if(sel)sel.classList.add('active');
  lcLoadMessages();
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(lcPollMessages,3000);
}

function lcUpdateStatus(status){
  var badge=document.getElementById('lc-status-badge');
  badge.textContent=status==='waiting'?'Đang chờ':status==='active'?'Đang hỗ trợ':'Đã kết thúc';
  badge.className='lc-status-badge '+status;
  document.getElementById('lc-btn-accept').style.display=status==='waiting'?'flex':'none';
  document.getElementById('lc-btn-close').style.display=status==='active'?'flex':'none';
  document.getElementById('lc-input-area').style.display=status==='active'?'flex':'none';
}

async function lcLoadMessages(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Messages/'+currentConvId+'?after_id=0');
    var d=await r.json();
    if(d.success){
      var box=document.getElementById('lc-messages');box.innerHTML='';
      d.messages.forEach(function(m){lcAddMsg(m)});
      if(d.messages.length)lastMsgId=d.messages[d.messages.length-1].message_id;
      lcUpdateStatus(d.status);
      box.scrollTop=box.scrollHeight;
    }
  }catch(e){}
}

async function lcPollMessages(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Messages/'+currentConvId+'?after_id='+lastMsgId);
    var d=await r.json();
    if(d.success&&d.messages.length){
      d.messages.forEach(function(m){lcAddMsg(m)});
      lastMsgId=d.messages[d.messages.length-1].message_id;
      var box=document.getElementById('lc-messages');box.scrollTop=box.scrollHeight;
    }
    if(d.status)lcUpdateStatus(d.status);
  }catch(e){}
}

function lcAddMsg(m){
  var div=document.createElement('div');
  div.className='lc-msg '+m.sender_type;
  div.innerHTML='<div class="lc-msg-wrap"><div class="lc-msg-bubble">'+lcEsc(m.content)+'</div><div class="lc-msg-time">'+lcEsc(m.created_at)+'</div></div>';
  document.getElementById('lc-messages').appendChild(div);
}

async function lcAccept(){
  if(!currentConvId)return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Accept/'+currentConvId,{method:'POST'});
    var d=await r.json();
    if(d.success){
      lcUpdateStatus('active');
      lcPollList();
      // Reload message list immediately to update system notification
      lcLoadMessages();
    }
  }catch(e){}
}

async function lcSendMsg(){
  var input=document.getElementById('lc-input');
  var msg=input.value.trim();if(!msg||!currentConvId)return;
  input.value='';
  try{
    var r=await fetch('/Admin/API/LiveChat/Send/'+currentConvId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    var d=await r.json();
    if(d.success)lcPollMessages();
  }catch(e){}
}

async function lcClose(){
  if(!currentConvId||!confirm('Kết thúc cuộc hội thoại?'))return;
  try{
    var r=await fetch('/Admin/API/LiveChat/Close/'+currentConvId,{method:'POST'});
    var d=await r.json();
    if(d.success){
      lcUpdateStatus('closed');
      lcPollList();
      // Reload message list immediately to update system notification
      lcLoadMessages();
    }
  }catch(e){}
}

function lcRenderList(data){
  var wl=document.getElementById('lc-waiting-list');wl.innerHTML='';
  var al=document.getElementById('lc-active-list');al.innerHTML='';
  document.getElementById('lc-waiting-badge').textContent=data.waiting.length;
  
  if (data.waiting.length > lastWaitingCount) {
    playPingSound();
  }
  lastWaitingCount = data.waiting.length;

  data.waiting.forEach(function(c){
    var d=document.createElement('div');d.className='lc-item'+(currentConvId===c.conversation_id?' active':'');
    d.dataset.id=c.conversation_id;
    d.innerHTML='<div class="lc-item-name"><i class="fas fa-user-circle"></i> '+lcEsc(c.customer_name)+'</div><div class="lc-item-subject">'+lcEsc(c.subject)+'</div><div class="lc-item-time">'+lcEsc(c.created_at)+'</div>';
    d.onclick=function(){lcSelectConv(c.conversation_id,c.customer_name,'waiting')};
    wl.appendChild(d);
  });
  data.active.forEach(function(c){
    var d=document.createElement('div');d.className='lc-item'+(currentConvId===c.conversation_id?' active':'');
    d.dataset.id=c.conversation_id;
    d.innerHTML='<div class="lc-item-name"><i class="fas fa-user-circle"></i> '+lcEsc(c.customer_name)+'</div><div class="lc-item-subject">'+lcEsc(c.subject)+'</div><div class="lc-item-time">'+lcEsc(c.created_at)+'</div>';
    d.onclick=function(){lcSelectConv(c.conversation_id,c.customer_name,'active')};
    al.appendChild(d);
  });
}

async function lcPollList(){
  try{
    var r=await fetch('/Admin/API/LiveChat/Waiting');
    var d=await r.json();
    if(d.success)lcRenderList(d);
  }catch(e){}
}

document.getElementById('lc-input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();lcSendMsg()}});

lcPollList();
listPollTimer=setInterval(lcPollList,5000);
</script>
</main>
</div>
{% include "partials/admin_finance_widget.html" %}
</body>
</html>
