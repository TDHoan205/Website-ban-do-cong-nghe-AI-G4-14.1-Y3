{% extends "Shared/base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Đăng nhập</h4>
                </div>
                <div class="card-body p-4">
                    <form action="/Auth/Login" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control" required placeholder="Nhập tên đăng nhập">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu">
                            </div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Đăng nhập
                        </button>

                        <div class="text-center">
                            <a href="/Auth/ForgotPassword" class="text-decoration-none">Quên mật khẩu?</a>
                        </div>
                    </form>

                    <hr>

                    <div class="text-center">
                        <p class="text-muted mb-2">Chưa có tài khoản?</p>
                        <a href="/Auth/Register" class="btn btn-outline-primary">
                            <i class="fas fa-user-plus"></i> Đăng ký ngay
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
