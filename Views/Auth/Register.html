<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Tech Store AI</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

  <link rel="stylesheet" href="/static/css/auth/register.css" />
</head>
  <body>
    <!-- Back to home -->
    <a href="/" class="back-home">
      <i class="fas fa-arrow-left"></i>
      Về trang chủ
    </a>

    <div class="auth-card">
      <!-- Icon -->
      <div class="auth-icon">
        <i class="fas fa-user-plus"></i>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Tạo tài khoản mới</h1>
      <p class="auth-subtitle">Đăng ký để bắt đầu mua sắm</p>

      <!-- Error message -->
      {% if request.query_params.get('error') %}
      <div class="auth-alert auth-alert-error">
        <i class="fas fa-circle-exclamation"></i>
        {{ request.query_params.get('error') }}
      </div>
      {% endif %}

      <!-- Form -->
      <form action="/Auth/Register" method="POST" onsubmit="return validateForm()">
        <!-- Username -->
        <div class="auth-form-group">
          <label class="auth-form-label">Tên đăng nhập <span class="required">*</span></label>
          <div class="auth-input-wrapper">
            <input
              type="text"
              name="username"
              class="auth-form-input"
              placeholder="Nhập tên đăng nhập"
              required
              minlength="3"
              maxlength="50"
              autocomplete="username"
            />
            <i class="fas fa-user auth-input-icon"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="auth-form-group">
          <label class="auth-form-label">Mật khẩu <span class="required">*</span></label>
          <div class="auth-input-wrapper">
            <input
              type="password"
              name="password"
              class="auth-form-input"
              placeholder="Mật khẩu"
              required
              minlength="6"
              autocomplete="new-password"
              id="passwordInput"
            />
            <i class="fas fa-lock auth-input-icon"></i>
            <button type="button" class="toggle-pw" onclick="togglePassword('passwordInput', 'togglePassword')">
              <i class="fas fa-eye" id="togglePassword"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="auth-form-group">
          <label class="auth-form-label">Xác nhận mật khẩu <span class="required">*</span></label>
          <div class="auth-input-wrapper">
            <input
              type="password"
              name="confirm_password"
              class="auth-form-input"
              placeholder="Nhập lại mật khẩu"
              required
              minlength="6"
              autocomplete="new-password"
              id="confirmPasswordInput"
            />
            <i class="fas fa-lock auth-input-icon"></i>
            <button type="button" class="toggle-pw" onclick="togglePassword('confirmPasswordInput', 'toggleConfirmPassword')">
              <i class="fas fa-eye" id="toggleConfirmPassword"></i>
            </button>
          </div>
        </div>

        <!-- Full name -->
        <div class="auth-form-group">
          <label class="auth-form-label">Họ và tên</label>
          <div class="auth-input-wrapper">
            <input
              type="text"
              name="full_name"
              class="auth-form-input"
              placeholder="Nhập họ và tên"
              autocomplete="name"
            />
            <i class="fas fa-id-card auth-input-icon"></i>
          </div>
        </div>

        <!-- Email -->
        <div class="auth-form-group">
          <label class="auth-form-label">Email <span class="required">*</span></label>
          <div class="auth-input-wrapper">
            <input
              type="email"
              name="email"
              class="auth-form-input"
              placeholder="Nhập địa chỉ email"
              required
              autocomplete="email"
            />
            <i class="fas fa-envelope auth-input-icon"></i>
          </div>
        </div>

        <!-- Phone -->
        <div class="auth-form-group">
          <label class="auth-form-label">Số điện thoại</label>
          <div class="auth-input-wrapper">
            <input
              type="tel"
              name="phone"
              class="auth-form-input"
              placeholder="Nhập số điện thoại"
              autocomplete="tel"
            />
            <i class="fas fa-phone auth-input-icon"></i>
          </div>
        </div>

        <!-- Address -->
        <div class="auth-form-group">
          <label class="auth-form-label">Địa chỉ</label>
          <div class="auth-input-wrapper">
            <input
              type="text"
              name="address"
              class="auth-form-input"
              placeholder="Nhập địa chỉ của bạn"
              autocomplete="street-address"
            />
            <i class="fas fa-location-dot auth-input-icon"></i>
          </div>
        </div>

        <!-- Agreement -->
        <div class="auth-agreement">
          <input type="checkbox" id="agreeCheckbox" required />
          <label for="agreeCheckbox">
            Tôi đồng ý với <a href="/Terms">Điều khoản sử dụng</a>
            và <a href="/Privacy">Chính sách bảo mật</a> của Tech Store AI
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="auth-submit-btn">
          <i class="fas fa-user-plus"></i>
          Tạo tài khoản
        </button>
      </form>

      <p class="auth-switch-prompt">
        Nhớ mật khẩu rồi?
        <a href="/Auth/Login">Đăng nhập ngay</a>
      </p>

      <!-- Brand -->
      <div class="auth-brand">
        <span class="auth-brand-text">
          <i class="fas fa-robot"></i> Tech Store AI
        </span>
      </div>
    </div>

    <script>
      function togglePassword(inputId, iconId) {
        var input = document.getElementById(inputId);
        var icon = document.getElementById(iconId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      }

      function validateForm() {
        var username = document.getElementsByName('username')[0].value.trim();
        var email = document.getElementsByName('email')[0].value.trim();
        var phone = document.getElementsByName('phone')[0].value.trim();
        var password = document.getElementById('passwordInput').value;
        var confirmPassword = document.getElementById('confirmPasswordInput').value;
        
        if (username.length < 3) {
          alert('Tên đăng nhập phải có tối thiểu 3 ký tự.');
          return false;
        }
        
        var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          alert('Vui lòng nhập địa chỉ email hợp lệ.');
          return false;
        }
        
        if (phone && !/^(0|\+84)\d{9,10}$/.test(phone)) {
          alert('Số điện thoại không hợp lệ. Vui lòng nhập 10-11 số hợp lệ.');
          return false;
        }

        if (password.length < 6) {
          alert('Mật khẩu phải có tối thiểu 6 ký tự.');
          return false;
        }
        if (password !== confirmPassword) {
          alert('Mật khẩu xác nhận không khớp.');
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
