<style>
/* AI Chatbot Widget - Dark Ocean Theme (đồng nhất với trang /Chat/) */
.cb-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, #4DA6FF, #2196F3);
  border: none; color: #fff; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; box-shadow: 0 6px 20px rgba(77,166,255,.4);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: cb-glow 3s ease-in-out infinite;
}
.cb-toggle:active {
  cursor: grabbing;
}
body.admin-page .cb-toggle { 
  display: none !important;
}
body.admin-page .cb-popup { 
  width: 320px; max-height: 480px;
  bottom: 100px; right: 24px;
}
@keyframes cb-glow {
  0%,100%{box-shadow:0 6px 20px rgba(77,166,255,.4),0 0 0 0 rgba(77,166,255,.2);}
  50%{box-shadow:0 10px 30px rgba(77,166,255,.55),0 0 0 10px rgba(77,166,255,0);}
}
.cb-toggle:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 30px rgba(77,166,255,.55);
}
.cb-toggle .badge-dot {
  position: absolute; top: 3px; right: 3px; width: 11px; height: 11px;
  background: #22c55e; border-radius: 50%;
  border: 2px solid #fff;
  animation: cb-online 2s infinite;
}
@keyframes cb-online {
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}
  50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}
}

/* === POPUP === */
.cb-popup {
  position: fixed; bottom: 84px; right: 24px; z-index: 9998;
  width: 360px; height: min(558px, calc(100vh - 120px)); border-radius: 14px;
  background: #1E3A5F;
  display: none; flex-direction: column;
  overflow: hidden; animation: cb-in .35s cubic-bezier(.4,0,.2,1);
  font-family: 'Be Vietnam Pro',sans-serif;
  border: 1px solid rgba(77,166,255,.2);
  box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 30px rgba(77,166,255,.1);
}
.cb-popup.active { display: flex; }
@keyframes cb-in {
  from{opacity:0;transform:translateY(24px) scale(.94);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* === HEADER === */
.cb-hdr {
  background: linear-gradient(135deg, #152A45, #1E3A5F);
  border-bottom: 1px solid rgba(77,166,255,.15);
  color: #fff; padding: 16px 18px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.cb-hdr-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #4DA6FF, #2196F3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; color: #fff;
  box-shadow: 0 4px 16px rgba(77,166,255,.4);
  animation: cb-icon-pulse 2.5s ease-in-out infinite alternate;
}
@keyframes cb-icon-pulse {
  from{box-shadow:0 4px 12px rgba(77,166,255,.3);}
  to{box-shadow:0 4px 24px rgba(77,166,255,.65);}
}
.cb-hdr-info { flex: 1; }
.cb-hdr-info h6 { margin: 0; font-weight: 700; font-size: .95rem; color: #E6F2FF; }
.cb-hdr-info small { opacity: .8; font-size: .74rem; color: #80C7FF; }
.cb-hdr-actions { display: flex; gap: 6px; }
.cb-hdr-actions button {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); color: #80C7FF;
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .83rem; transition: all .15s;
}
.cb-hdr-actions button:hover { background: rgba(77,166,255,.2); color: #fff; border-color: rgba(77,166,255,.4); }

/* === MESSAGES AREA === */
.cb-msgs {
  flex: 1; overflow-y: auto; padding: 16px;
  background: #152A45;
  min-height: 0;
  scroll-behavior: smooth;
}
.cb-msgs::-webkit-scrollbar { width: 4px; }
.cb-msgs::-webkit-scrollbar-track { background: transparent; }
.cb-msgs::-webkit-scrollbar-thumb { background: rgba(77,166,255,.25); border-radius: 10px; }

.cb-msg { display: flex; margin-bottom: 14px; animation: cb-msg .3s ease; }
@keyframes cb-msg { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.cb-msg.user { flex-direction: row-reverse; }
.cb-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; flex-shrink: 0; margin: 0 8px;
}
.cb-msg.bot .cb-avatar { background: rgba(77,166,255,.18); color: #4DA6FF; }
.cb-msg.user .cb-avatar { background: linear-gradient(135deg, #4DA6FF, #2196F3); color: #fff; }

/* === BUBBLES === */
.cb-bubble {
  max-width: 84%; min-width: 210px; padding: 11px 15px; border-radius: 18px;
  font-size: .86rem; line-height: 1.6; word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: normal;
}
.cb-msg.bot .cb-bubble {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  color: #E6F2FF;
  border-bottom-left-radius: 5px;
}
.cb-msg.user .cb-bubble {
  background: linear-gradient(135deg, #4DA6FF, #2196F3);
  color: #fff; border-bottom-right-radius: 5px;
}
.cb-bubble p { margin: 0 0 5px; }
.cb-bubble p:last-child { margin-bottom: 0; }
.cb-bubble strong { font-weight: 600; }
.cb-bubble code {
  background: rgba(255,255,255,.1); padding: 1px 5px;
  border-radius: 3px; font-size: .82em;
}
.cb-time { font-size: .68rem; color: rgba(255,255,255,.35); margin-top: 4px; padding: 0 4px; }
.cb-msg.user .cb-time { text-align: right; }

/* === TYPING === */
.cb-typing .cb-bubble { padding: 14px 18px; }
.cb-dots { display: flex; gap: 4px; }
.cb-dots span {
  width: 7px; height: 7px; background: rgba(255,255,255,.4);
  border-radius: 50%; animation: cb-bounce 1.4s infinite;
}
.cb-dots span:nth-child(2){animation-delay:.18s}
.cb-dots span:nth-child(3){animation-delay:.36s}
@keyframes cb-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

/* === QUICK ACTIONS === */
.cb-quick {
  padding: 10px 14px; border-top: 1px solid rgba(255,255,255,.07);
  background: #1E3A5F; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
}
.cb-quick-btn {
  padding: 5px 13px; font-size: .73rem; border-radius: 999px;
  border: 1.5px solid rgba(77,166,255,.5); color: #80C7FF; background: transparent;
  cursor: pointer; font-family: inherit; font-weight: 600;
  transition: all .2s;
}
.cb-quick-btn:hover { background: rgba(77,166,255,.2); color: #fff; border-color: #4DA6FF; }

/* === INPUT === */
.cb-input {
  padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.07);
  background: #1E3A5F; display: flex; gap: 8px;
  align-items: center; flex-shrink: 0;
}
.cb-input input {
  flex: 1; border: 1.5px solid rgba(255,255,255,.12); border-radius: 999px;
  padding: 10px 18px; font-size: .85rem; outline: none;
  font-family: inherit; transition: all .2s;
  background: rgba(255,255,255,.07);
  color: #E6F2FF;
}
.cb-input input::placeholder { color: rgba(255,255,255,.35); }
.cb-input input:focus {
  border-color: #4DA6FF;
  box-shadow: 0 0 0 3px rgba(77,166,255,.15);
  background: rgba(255,255,255,.1);
}
.cb-send {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #4DA6FF, #2196F3); color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .88rem; transition: all .2s;
  box-shadow: 0 4px 14px rgba(77,166,255,.35);
}
.cb-send:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(77,166,255,.5); }
.cb-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

@media (max-width: 480px) {
  .cb-popup {
    width: calc(100vw - 20px); right: 10px;
    bottom: 96px; height: min(620px, calc(100vh - 116px));
  }
}
</style>

<button class="cb-toggle" id="cb-toggle" title="Chat với AI">
  <i class="fas fa-comments"></i>
  <span class="badge-dot"></span>
</button>

<div class="cb-popup" id="cb-popup">
  <div class="cb-hdr">
    <div class="cb-hdr-icon"><i class="fas fa-robot"></i></div>
    <div class="cb-hdr-info">
      <h6>Trợ lý AI Tech Store</h6>
      <small><i class="fas fa-circle" style="font-size:.45rem;color:#22c55e"></i> Sẵn sàng hỗ trợ</small>
    </div>
    <div class="cb-hdr-actions">
      <button onclick="window.open('/Chat/','_blank')" title="Mở trang chat lớn"><i class="fas fa-expand-alt"></i></button>
      <button onclick="cbClose()" title="Đóng"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <div class="cb-msgs" id="cb-msgs">
    <div class="cb-msg bot">
      <div class="cb-avatar"><i class="fas fa-robot"></i></div>
      <div>
        <div class="cb-bubble">
          Xin chào! Tôi là <strong>Trợ lý AI</strong> của Tech Store.<br><br>
          Tôi có thể giúp bạn:<br>
          • Tìm và tư vấn sản phẩm công nghệ<br>
          • So sánh giá, thông số kỹ thuật<br>
          • Tra cứu đơn hàng, khuyến mãi<br><br>
          Bạn cần hỗ trợ gì?
        </div>
        <div class="cb-time">Vừa xong</div>
      </div>
    </div>
  </div>
  <div class="cb-quick" id="cb-quick">
    <button class="cb-quick-btn" onclick="cbSend('Sản phẩm nổi bật?')">🔥 Sản phẩm HOT</button>
    <button class="cb-quick-btn" onclick="cbSend('Có khuyến mãi gì?')">🏷️ Khuyến mãi</button>
    <button class="cb-quick-btn" onclick="cbSend('Tư vấn laptop')">💻 Tư vấn laptop</button>
    <button class="cb-quick-btn" onclick="cbRequestLiveChat()" style="border-color:#22c55e;color:#22c55e">💬 Chat nhân viên</button>
  </div>
  <div class="cb-input">
    <input type="text" id="cb-input" placeholder="Nhập tin nhắn..." autocomplete="off" />
    <button class="cb-send" id="cb-send" onclick="cbSendInput()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script>
(function(){
  var toggle=document.getElementById('cb-toggle');
  var popup=document.getElementById('cb-popup');
  var msgs=document.getElementById('cb-msgs');
  var input=document.getElementById('cb-input');
  var sendBtn=document.getElementById('cb-send');
  var hdr=document.querySelector('.cb-hdr');
  var sessionUuid=localStorage.getItem('cb_session')||'',sending=false;

  // --- Drag and Drop Logic ---
  var isDragging = false, hasDragged = false, dragEl = null, offsetX = 0, offsetY = 0;
  
  function startDrag(e, el) {
    if(e.target.closest('button, input, a')) return;
    isDragging = true; hasDragged = false; dragEl = el;
    var rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
  }
  
  function onDrag(e) {
    if(!isDragging) return;
    hasDragged = true;
    var x = e.clientX - offsetX;
    var y = e.clientY - offsetY;
    var maxX = window.innerWidth - dragEl.offsetWidth;
    var maxY = window.innerHeight - dragEl.offsetHeight;
    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));
    dragEl.style.right = 'auto';
    dragEl.style.bottom = 'auto';
    dragEl.style.left = x + 'px';
    dragEl.style.top = y + 'px';
  }
  
  function stopDrag(e) {
    if(dragEl) dragEl.style.transition = '';
    isDragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    setTimeout(function(){ hasDragged = false; }, 50);
  }

  toggle.addEventListener('mousedown', function(e) { startDrag(e, toggle); });
  if(hdr) {
    hdr.style.cursor = 'move';
    hdr.addEventListener('mousedown', function(e) { startDrag(e, popup); });
  }
  // ---------------------------

  // Live chat state
  var liveChatMode=false,liveChatConvId=null,liveChatPollTimer=null,liveChatLastId=0;

  toggle.addEventListener('click',function(e){
    if(hasDragged) return; // Prevent click if we were dragging
    var willOpen=!popup.classList.contains('active');
    if(willOpen&&typeof window.closeAdminFinanceWidget==='function'){
      window.closeAdminFinanceWidget();
    }
    popup.classList.toggle('active');
    if(popup.classList.contains('active')){
      toggle.innerHTML='<i class="fas fa-times"></i>';
      input.focus();
      if(!sessionUuid)initSession();
    } else {
      toggle.innerHTML='<i class="fas fa-comments"></i><span class="badge-dot"></span>';
    }
  });

  window.cbClose=function(){
    popup.classList.remove('active');
    toggle.innerHTML='<i class="fas fa-comments"></i><span class="badge-dot"></span>';
  };

  window.closeMainChatWidget=function(){
    popup.classList.remove('active');
    toggle.innerHTML='<i class="fas fa-comments"></i><span class="badge-dot"></span>';
  };

  window.openMainChatWidget=function(){
    if(typeof window.closeAdminFinanceWidget==='function'){
      window.closeAdminFinanceWidget();
    }
    popup.classList.add('active');
    toggle.innerHTML='<i class="fas fa-times"></i>';
    input.focus();
    if(!sessionUuid)initSession();
  };

  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cbSendInput();}
  });

  async function initSession(){
    try{
      var r=await fetch('/Chat/Widget/Init',{method:'POST'});
      var d=await r.json();
      if(d.success){sessionUuid=d.session_uuid;localStorage.setItem('cb_session',sessionUuid);}
    } catch(e){}
  }

  window.cbSendInput=function(){
    var msg=input.value.trim();
    if(!msg||sending)return;
    input.value='';
    if(liveChatMode){
      cbSendLiveChat(msg);
    } else {
      cbSend(msg);
    }
  };

  window.cbSend=async function(message){
    if(sending)return;
    if(!sessionUuid)await initSession();
    sending=true;sendBtn.disabled=true;
    addMsg(message,'user');
    document.getElementById('cb-quick').style.display='none';
    var typ=document.createElement('div');
    typ.className='cb-msg bot cb-typing';
    typ.id='cb-typing';
    typ.innerHTML='<div class="cb-avatar"><i class="fas fa-robot"></i></div><div><div class="cb-bubble"><div class="cb-dots"><span></span><span></span><span></span></div></div></div>';
    msgs.appendChild(typ);
    msgs.scrollTop=msgs.scrollHeight;
    try{
      var r=await fetch('/Chat/Widget/Send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_uuid:sessionUuid,message:message})});
      var d=await r.json();
      var t=document.getElementById('cb-typing');
      if(t)t.remove();
      if(d.success){
        if(d.session_uuid){sessionUuid=d.session_uuid;localStorage.setItem('cb_session',sessionUuid);}
        if(d.live_chat&&d.conversation_id){
          enterLiveChatMode(d.conversation_id);
          addMsg(d.response,'bot');
        } else {
          addMsg(d.response,'bot');
        }
      } else {
        addMsg('Đã xảy ra lỗi. Vui lòng thử lại.','bot');
      }
    } catch(e){
      var t=document.getElementById('cb-typing');
      if(t)t.remove();
      addMsg('Không thể kết nối server.','bot');
    }
    sending=false;sendBtn.disabled=false;input.focus();
  };

  // ═══ LIVE CHAT MODE ═══

  window.cbRequestLiveChat=async function(){
    if(!sessionUuid)await initSession();
    document.getElementById('cb-quick').style.display='none';
    addMsg('💬 Yêu cầu nói chuyện với nhân viên','user');
    try{
      var r=await fetch('/Chat/LiveChat/Request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_uuid:sessionUuid})});
      var d=await r.json();
      if(d.success){
        enterLiveChatMode(d.conversation_id);
        addMsg('Đang kết nối bạn với nhân viên hỗ trợ. Vui lòng đợi trong giây lát... 💬','bot');
      }
    }catch(e){addMsg('Lỗi kết nối. Vui lòng thử lại.','bot');}
  };

  function enterLiveChatMode(convId){
    liveChatMode=true;
    liveChatConvId=convId;
    liveChatLastId=0;
    var hdrInfo=document.querySelector('#cb-popup .cb-hdr-info');
    if(hdrInfo){
      hdrInfo.innerHTML='<h6><i class="fas fa-headset" style="margin-right:4px"></i> Live Chat</h6><small><i class="fas fa-circle" style="font-size:.45rem;color:#facc15"></i> Đang chờ nhân viên...</small>';
    }
    input.placeholder='Nhắn tin cho nhân viên...';
    if(liveChatPollTimer)clearInterval(liveChatPollTimer);
    liveChatPollTimer=setInterval(pollLiveChatMessages,3000);
  }

  function exitLiveChatMode(){
    liveChatMode=false;
    liveChatConvId=null;
    if(liveChatPollTimer)clearInterval(liveChatPollTimer);
    var hdrInfo=document.querySelector('#cb-popup .cb-hdr-info');
    if(hdrInfo){
      hdrInfo.innerHTML='<h6>Trợ lý AI Tech Store</h6><small><i class="fas fa-circle" style="font-size:.45rem;color:#22c55e"></i> Sẵn sàng hỗ trợ</small>';
    }
    input.placeholder='Nhập tin nhắn...';
    var quick=document.getElementById('cb-quick');
    if(quick)quick.style.display='flex';
  }

  async function cbSendLiveChat(message){
    if(!liveChatConvId)return;
    sending=true;sendBtn.disabled=true;
    addMsg(message,'user');
    try{
      await fetch('/Chat/LiveChat/Send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:liveChatConvId,message:message})});
    }catch(e){}
    sending=false;sendBtn.disabled=false;input.focus();
  }

  async function pollLiveChatMessages(){
    if(!liveChatConvId)return;
    try{
      var r=await fetch('/Chat/LiveChat/Messages/'+liveChatConvId+'?after_id='+liveChatLastId);
      var d=await r.json();
      if(d.success&&d.messages.length){
        d.messages.forEach(function(m){
          if(m.sender_type==='staff'){
            addMsg(m.content,'bot','fa-headset');
          } else if(m.sender_type==='system'){
            addSystemMsg(m.content);
          }
          liveChatLastId=m.message_id;
        });
      }
      if(d.status==='active'){
        var hdrSmall=document.querySelector('#cb-popup .cb-hdr-info small');
        if(hdrSmall)hdrSmall.innerHTML='<i class="fas fa-circle" style="font-size:.45rem;color:#22c55e"></i> Nhân viên đang hỗ trợ';
      }
      if(d.status==='closed'){
        addSystemMsg('Cuộc hội thoại đã kết thúc. Bạn có thể tiếp tục chat với AI.');
        exitLiveChatMode();
      }
    }catch(e){}
  }

  function addSystemMsg(content){
    var div=document.createElement('div');
    div.className='cb-msg bot';
    div.innerHTML='<div style="margin:0 auto;text-align:center;width:100%"><div class="cb-bubble" style="background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);color:#facc15;font-size:.78rem;font-style:italic;display:inline-block;max-width:90%">'+escHtml(content)+'</div></div>';
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }

  function addMsg(content,sender,iconOverride){
    var div=document.createElement('div');
    div.className='cb-msg '+sender;
    var icon=iconOverride||(sender==='bot'?'fa-robot':'fa-user');
    if(liveChatMode&&sender==='bot'&&!iconOverride)icon='fa-headset';
    var now=new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
    var rendered=sender==='bot'?renderMd(escHtml(content)):escHtml(content);
    div.innerHTML='<div class="cb-avatar"><i class="fas '+icon+'"></i></div><div><div class="cb-bubble">'+rendered+'</div><div class="cb-time">'+now+'</div></div>';
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }

  function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  function renderMd(t){
    if(!t)return'';
    var h=t;
    h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
    h=h.replace(/`(.+?)`/g,'<code>$1</code>');
    h=h.replace(/^[-•]\s+(.+)/gm,'<li>$1</li>');
    h=h.replace(/(<li>.*<\/li>)/gs,'<ul style="margin:4px 0;padding-left:18px">$1</ul>');
    h=h.replace(/\n/g,'<br>');
    h=h.replace(/(<br>){3,}/g,'<br><br>');
    return h;
  }
})();
</script>
